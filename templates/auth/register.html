{% extends "base.html" %}{% block title %}Cont nou — CineMatch{% endblock %}{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand"><span class="brand-cm">CINE</span><span class="brand-match">MATCH</span></div>
        <h2 class="auth-title">Creează cont</h2>
        <form method="POST">
            <div class="form-field">
                <label>Username</label>
                <input type="text" name="username" required placeholder="cinematch_user" minlength="3">
            </div>
            <div class="form-field">
                <label>Email</label>
                <input type="email" name="email" required placeholder="email@exemplu.com">
            </div>
            <div class="form-field">
                <label>Parolă</label>
                <input type="password" name="password" required placeholder="Minim 6 caractere" minlength="6">
            </div>
            <button type="submit" class="auth-btn">Creează cont</button>
        </form>
        <p class="auth-switch">Ai deja cont? <a href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
